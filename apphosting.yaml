# Firebase App Hosting config for dashboard.wayfloat.com.
# Sensitive values are referenced as secrets and must be created in the
# app-performance-dashboard Firebase project before deployment.
runConfig:
  minInstances: 0
  maxInstances: 1
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_DASHBOARD_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_DASHBOARD_FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_DASHBOARD_FIREBASE_AUTH_DOMAIN
    value: app-performance-dashboard.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_DASHBOARD_FIREBASE_PROJECT_ID
    value: app-performance-dashboard
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_DASHBOARD_FIREBASE_APP_ID
    secret: NEXT_PUBLIC_DASHBOARD_FIREBASE_APP_ID
    availability:
      - BUILD
      - RUNTIME

  - variable: AUTH_SECRET
    secret: AUTH_SECRET
  - variable: DASHBOARD_ALLOWED_PHONE_NUMBERS
    secret: DASHBOARD_ALLOWED_PHONE_NUMBERS
